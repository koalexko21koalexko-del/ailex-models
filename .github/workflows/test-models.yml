name: Ежедневный пост в Telegram

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  post-to-telegram:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Create Python script
        run: |
          cat > post_generator.py << 'EOF'
          import requests
          import os
          import sys
          from datetime import datetime

          today = datetime.now().strftime("%d %B %Y")

          github_token = os.environ.get("GITHUB_TOKEN")
          if not github_token:
              print("Ошибка: GITHUB_TOKEN не найден")
              sys.exit(1)

          print("Генерация поста через GitHub Models...")

          url = "https://models.inference.ai.azure.com/chat/completions"
          headers = {
              "Authorization": f"Bearer {github_token}",
              "Content-Type": "application/json"
          }
          payload = {
              "model": "DeepSeek-R1",
              "messages": [
                  {
                      "role": "system",
                      "content": (
                          "Ты — AiLex, таролог с 25-летним стажем. "
                          "Ты пишешь посты для Telegram-канала 'Школа Таро с AiLex'. "
                          "Твой стиль — образный, философский, как разговор у камина. "
                          "Не используй списки, инструкции и не будь слишком 'учебным'."
                      )
                  },
                  {
                      "role": "user",
                      "content": (
                          f"Сегодня {today}. "
                          "Придумай пост для канала с 'Картой дня'. "
                          "Выбери одну карту Таро и опиши её значение для сегодняшнего дня. "
                          "Сделай текст тёплым, личным и вдохновляющим, на 200-300 слов."
                      )
                  }
              ],
              "temperature": 0.7,
              "max_tokens": 800
          }

          try:
              response = requests.post(url, headers=headers, json=payload, timeout=60)
              response.raise_for_status()
              result = response.json()
              post_text = result["choices"][0]["message"]["content"]
              print("Пост сгенерирован.")
          except Exception as e:
              print(f"Ошибка при обращении к GitHub Models: {e}")
              sys.exit(1)

          telegram_token = os.environ.get("TELEGRAM_BOT_TOKEN")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID")

          if not telegram_token or not chat_id:
              print("Ошибка: не найдены токен или ID канала.")
              sys.exit(1)

          telegram_api_url = f"https://api.telegram.org/bot{telegram_token}/sendMessage"
          payload = {
              "chat_id": chat_id,
              "text": post_text,
              "parse_mode": "HTML",
          }

          response = requests.post(telegram_api_url, json=payload)

          if response.status_code == 200:
              print("✅ Пост успешно отправлен в Telegram!")
          else:
              print(f"❌ Ошибка при отправке: {response.status_code}")
              print(response.text)
              sys.exit(1)
          EOF

      - name: Run script
        run: python post_generator.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
